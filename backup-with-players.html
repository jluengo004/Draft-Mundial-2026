<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 — Draft</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a40;
    --accent: #e8c840;
    --accent2: #4080ff;
    --red: #ff4444;
    --green: #44cc88;
    --text: #e8e8f0;
    --muted: #6060a0;
    --radius: 4px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCREEN SYSTEM ── */
  .screen { display:none; min-height:100vh; }
  .screen.active { display:flex; flex-direction:column; }

  /* ── LOGIN SCREEN ── */
  #screen-login {
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(ellipse 60% 40% at 30% 20%, #1a1a3a 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 80% 80%, #0a1a10 0%, transparent 60%),
      var(--bg);
  }

  .login-box {
    width: min(420px, 92vw);
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 40px;
    position: relative;
  }

  .login-box::before {
    content:'';
    position:absolute;
    top:0; left:0; right:0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }

  .login-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 4px;
    line-height:1;
    margin-bottom: 4px;
  }

  .login-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .login-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display:block;
  }

  .user-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 28px;
  }

  .user-btn {
    padding: 12px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align:left;
    position:relative;
    overflow:hidden;
  }

  .user-btn:hover {
    border-color: var(--accent2);
    background: #1a1a36;
  }

  .user-btn.selected {
    border-color: var(--accent);
    background: #1e1a00;
    color: var(--accent);
    font-weight:600;
  }

  .user-btn.selected::after {
    content:'✓';
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    color:var(--accent);
  }

  .btn-primary {
    width:100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary:hover { background: #f5d840; transform:translateY(-1px); }
  .btn-primary:disabled { background: #444; color: #888; cursor:not-allowed; transform:none; }

  /* ── MAIN SCREEN ── */
  #screen-main {
    background: var(--bg);
  }

  .topbar {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position:sticky;
    top:0;
    z-index:100;
  }

  .topbar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .topbar-user {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .topbar-user span { color: var(--text); font-weight:600; }

  .nav-tabs {
    display:flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .nav-tab {
    padding: 16px 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display:none; flex:1; }
  .tab-content.active { display:flex; flex-direction:column; }

  /* ── PLANTILLA TAB ── */
  #tab-plantilla {
    padding: 28px;
    overflow-y:auto;
  }

  .plantilla-header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 24px;
    flex-wrap:wrap;
    gap:12px;
  }

  .plantilla-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 4px;
  }

  .plantilla-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    padding: 6px 14px;
    border: 1px solid var(--border);
  }

  .user-selector-row {
    display:flex;
    gap:8px;
    margin-bottom: 24px;
    flex-wrap:wrap;
  }

  .user-pill {
    padding: 7px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1px;
    border: 1px solid var(--border);
    cursor: pointer;
    background: var(--surface2);
    color: var(--muted);
    transition: all 0.15s;
  }

  .user-pill:hover { border-color: var(--accent2); color:var(--text); }
  .user-pill.active { border-color:var(--accent); color:var(--accent); background:#1e1a00; }

  .plantilla-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }

  .player-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 12px 14px;
    position:relative;
  }

  .player-card-pos {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform:uppercase;
    margin-bottom: 4px;
  }

  .player-card-pos.PO { color: #ff9944; }
  .player-card-pos.DF { color: #4499ff; }
  .player-card-pos.MC { color: #44cc88; }
  .player-card-pos.DC { color: #cc44ff; }

  .player-card-name {
    font-weight:600;
    font-size: 0.85rem;
    line-height:1.3;
    margin-bottom: 4px;
  }

  .player-card-country {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
  }

  .empty-slot {
    background: transparent;
    border: 1px dashed var(--border);
    padding: 12px 14px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing:1px;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height: 70px;
  }

  /* ── DRAFT TAB ── */
  #tab-draft {
    display:flex;
    flex-direction:column;
    overflow:hidden;
    height: calc(100vh - 113px);
  }

  .draft-status-bar {
    padding: 14px 28px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
  }

  .draft-status-item {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .draft-status-item span { color:var(--text); font-weight:600; }
  .draft-status-item.highlight span { color:var(--accent); }

  .draft-turn-indicator {
    margin-left:auto;
    padding: 8px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    border: 1px solid;
  }

  .draft-turn-indicator.my-turn {
    color: var(--accent);
    border-color: var(--accent);
    background: #1e1a00;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .draft-turn-indicator.other-turn {
    color: var(--muted);
    border-color: var(--border);
  }

  .draft-turn-indicator.done {
    color: var(--green);
    border-color: var(--green);
  }

  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.6; }
  }

  .draft-body {
    display:flex;
    flex:1;
    overflow:hidden;
  }

  /* Left: player list */
  .draft-player-panel {
    width: 360px;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    border-right: 1px solid var(--border);
    overflow:hidden;
  }

  .draft-search-bar {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .draft-search-input {
    flex:1;
    min-width:120px;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    outline:none;
  }

  .draft-search-input:focus { border-color: var(--accent2); }

  .filter-pos-btn {
    padding: 6px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing:1px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor:pointer;
    transition: all 0.15s;
  }

  .filter-pos-btn.active { color:var(--text); border-color:var(--accent2); }

  .draft-player-list {
    overflow-y:auto;
    flex:1;
  }

  .country-section { border-bottom: 1px solid var(--border); }

  .country-header {
    padding: 10px 16px;
    background: var(--surface2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    user-select:none;
  }

  .country-header:hover { color:var(--text); }
  .country-header.has-drafted { color: var(--muted); opacity:0.5; }
  .country-header .chevron { transition: transform 0.2s; }
  .country-header.collapsed .chevron { transform: rotate(-90deg); }

  .country-players { }
  .country-section.collapsed .country-players { display:none; }

  .draft-player-row {
    padding: 8px 16px 8px 24px;
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }

  .draft-player-row:hover:not(.drafted):not(.country-drafted) {
    background: var(--surface2);
    border-left-color: var(--accent2);
  }

  .draft-player-row.drafted {
    opacity:0.35;
    cursor:default;
    text-decoration:line-through;
  }

  .draft-player-row.country-drafted {
    opacity:0.25;
    cursor:not-allowed;
  }

  .dpr-pos {
    font-family:'IBM Plex Mono',monospace;
    font-size:0.6rem;
    letter-spacing:1px;
    width:22px;
    text-transform:uppercase;
  }

  .dpr-pos.PO { color:#ff9944; }
  .dpr-pos.DF { color:#4499ff; }
  .dpr-pos.MC { color:#44cc88; }
  .dpr-pos.DC { color:#cc44ff; }

  .dpr-name {
    flex:1;
    font-size:0.82rem;
  }

  .dpr-badge {
    font-family:'IBM Plex Mono',monospace;
    font-size:0.6rem;
    padding:2px 6px;
    border:1px solid var(--border);
    color:var(--muted);
  }

  /* Right: draft order + picks */
  .draft-right-panel {
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  .draft-order-panel {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    overflow-x:auto;
  }

  .draft-order-title {
    font-family:'IBM Plex Mono',monospace;
    font-size:0.65rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:10px;
  }

  .draft-order-row {
    display:flex;
    gap:6px;
    min-width:max-content;
  }

  .draft-order-chip {
    padding: 5px 12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.65rem;
    border:1px solid var(--border);
    color:var(--muted);
    white-space:nowrap;
    position:relative;
  }

  .draft-order-chip.current {
    border-color:var(--accent);
    color:var(--accent);
    background:#1e1a00;
  }

  .draft-order-chip.done-chip {
    opacity:0.4;
    text-decoration:line-through;
  }

  .draft-picks-panel {
    flex:1;
    overflow-y:auto;
    padding:16px 20px;
  }

  .picks-title {
    font-family:'IBM Plex Mono',monospace;
    font-size:0.65rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:14px;
  }

  .pick-row {
    display:flex;
    align-items:center;
    gap:10px;
    padding:7px 0;
    border-bottom:1px solid var(--border);
  }

  .pick-num {
    font-family:'IBM Plex Mono',monospace;
    font-size:0.65rem;
    color:var(--muted);
    width:28px;
  }

  .pick-user {
    font-family:'IBM Plex Mono',monospace;
    font-size:0.7rem;
    width:110px;
    color:var(--accent2);
  }

  .pick-player {
    flex:1;
    font-size:0.82rem;
  }

  .pick-country {
    font-family:'IBM Plex Mono',monospace;
    font-size:0.65rem;
    color:var(--muted);
  }

  .pick-pos {
    font-family:'IBM Plex Mono',monospace;
    font-size:0.6rem;
    width:22px;
  }

  .pick-pos.PO { color:#ff9944; }
  .pick-pos.DF { color:#4499ff; }
  .pick-pos.MC { color:#44cc88; }
  .pick-pos.DC { color:#cc44ff; }

  /* Confirm modal */
  .modal-overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    z-index:1000;
    align-items:center;
    justify-content:center;
  }

  .modal-overlay.open { display:flex; }

  .modal-box {
    background:var(--surface);
    border:1px solid var(--accent);
    padding:32px;
    width:min(380px,90vw);
  }

  .modal-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:1.5rem;
    letter-spacing:3px;
    margin-bottom:8px;
  }

  .modal-body {
    font-size:0.9rem;
    color:var(--muted);
    margin-bottom:24px;
    line-height:1.6;
  }

  .modal-body strong { color:var(--text); }

  .modal-actions { display:flex; gap:10px; }

  .btn-secondary {
    flex:1;
    padding:12px;
    background:transparent;
    border:1px solid var(--border);
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:0.75rem;
    letter-spacing:2px;
    cursor:pointer;
    transition:all 0.15s;
  }

  .btn-secondary:hover { border-color:var(--muted); }

  .btn-danger {
    flex:1;
    padding:12px;
    background:transparent;
    border:1px solid var(--accent);
    color:var(--accent);
    font-family:'Bebas Neue',sans-serif;
    font-size:1rem;
    letter-spacing:3px;
    cursor:pointer;
    transition:all 0.15s;
  }

  .btn-danger:hover { background:#1e1a00; }

  /* Toast */
  #toast {
    position:fixed;
    bottom:28px;
    right:28px;
    padding:12px 24px;
    background:var(--surface2);
    border:1px solid var(--border);
    font-family:'IBM Plex Mono',monospace;
    font-size:0.75rem;
    z-index:2000;
    transform:translateY(80px);
    opacity:0;
    transition:all 0.3s;
  }

  #toast.show { transform:translateY(0); opacity:1; }
  #toast.error { border-color:var(--red); color:var(--red); }
  #toast.success { border-color:var(--green); color:var(--green); }

  /* Scrollbar */
  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* Draft complete banner */
  .draft-complete-banner {
    margin: 20px 28px;
    padding: 20px 24px;
    background: linear-gradient(135deg, #0a1a0a, #0a0f0a);
    border: 1px solid var(--green);
    font-family:'IBM Plex Mono',monospace;
    font-size:0.8rem;
    color:var(--green);
    letter-spacing:2px;
    display:none;
  }

  .draft-complete-banner.show { display:block; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="login-title">MUNDIAL<br>2026</div>
    <div class="login-sub">FIFA World Cup · Draft League</div>
    <label class="login-label">Selecciona tu usuario</label>
    <div class="user-grid" id="user-grid"></div>
    <button class="btn-primary" id="btn-enter" disabled>ENTRAR</button>
  </div>
</div>

<!-- MAIN SCREEN -->
<div id="screen-main" class="screen">
  <div class="topbar">
    <div class="topbar-title">MUNDIAL 2026</div>
    <div class="topbar-user">Jugando como <span id="topbar-username">—</span></div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('plantilla')">Plantilla</button>
    <button class="nav-tab" onclick="switchTab('draft')">Draft</button>
  </div>

  <!-- PLANTILLA TAB -->
  <div id="tab-plantilla" class="tab-content active">
    <div class="plantilla-header">
      <div class="plantilla-title">Mi Plantilla</div>
      <div class="plantilla-count" id="plantilla-count">0 / 17 jugadores</div>
    </div>
    <div class="user-selector-row" id="plantilla-user-selector"></div>
    <div id="plantilla-grid" class="plantilla-grid"></div>
  </div>

  <!-- DRAFT TAB -->
  <div id="tab-draft" class="tab-content">
    <div class="draft-status-bar">
      <div class="draft-status-item highlight">Turno <span id="ds-turn-num">1</span></div>
      <div class="draft-status-item">Ronda <span id="ds-round">1</span></div>
      <div class="draft-status-item">Le toca a <span id="ds-current-user">—</span></div>
      <div class="draft-status-item">Tus picks <span id="ds-my-picks">0</span> / 17</div>
      <div id="draft-turn-indicator" class="draft-turn-indicator other-turn">ESPERANDO</div>
    </div>
    <div class="draft-complete-banner" id="draft-complete-banner">
      ✓ DRAFT COMPLETADO — Todos los jugadores han sido seleccionados
    </div>
    <div class="draft-body">
      <!-- Player list -->
      <div class="draft-player-panel">
        <div class="draft-search-bar">
          <input type="text" class="draft-search-input" id="search-input" placeholder="Buscar jugador..." oninput="filterPlayers()">
          <button class="filter-pos-btn active" onclick="togglePosFilter(this,'ALL')" data-pos="ALL">TODOS</button>
          <button class="filter-pos-btn" onclick="togglePosFilter(this,'PO')" data-pos="PO" style="color:#ff9944">PO</button>
          <button class="filter-pos-btn" onclick="togglePosFilter(this,'DF')" data-pos="DF" style="color:#4499ff">DF</button>
          <button class="filter-pos-btn" onclick="togglePosFilter(this,'MC')" data-pos="MC" style="color:#44cc88">MC</button>
          <button class="filter-pos-btn" onclick="togglePosFilter(this,'DC')" data-pos="DC" style="color:#cc44ff">DC</button>
        </div>
        <div class="draft-player-list" id="draft-player-list"></div>
      </div>
      <!-- Right panel -->
      <div class="draft-right-panel">
        <div class="draft-order-panel">
          <div class="draft-order-title">Orden del draft</div>
          <div class="draft-order-row" id="draft-order-row"></div>
        </div>
        <div class="draft-picks-panel">
          <div class="picks-title">Picks realizados</div>
          <div id="draft-picks-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">CONFIRMAR PICK</div>
    <div class="modal-body" id="modal-body">¿Quieres fichar a este jugador?</div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">CANCELAR</button>
      <button class="btn-danger" onclick="confirmPick()">FICHAR</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ────────────────────────────────────────────────────────
// DATA
// ────────────────────────────────────────────────────────
const USERS = [
  'Jon Luengo','Oier Ezkerro','Urko Fernandez','Ortiz Mardones',
  'Urtzi Suaga','Markel Rodeño','Jokin Garcia de Cortazar',
  'Mikel Palomero','Aritz Gutierrez'
];

const MAX_PICKS = 17;

// Players data from the FIFA 2026 squads PDF

// ────────────────────────────────────────────────────────
// STATE — stored in localStorage so it persists
// ────────────────────────────────────────────────────────
const STORAGE_KEY = 'mundial2026_draft_v3';

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return null;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState() || {
  draftOrder: [],   // array of user names for all picks (9*17 = 153 entries)
  picks: [],        // [{pickNum, user, playerId}]
  currentTurn: 0,   // index into draftOrder
};

// If no draft order yet, generate it on first visit
function generateDraftOrder() {
  if (state.draftOrder.length > 0) return;
  // shuffle users for round 1
  const shuffled = [...USERS].sort(() => Math.random() - 0.5);
  const order = [];
  for (let round = 0; round < MAX_PICKS; round++) {
    const roundOrder = round % 2 === 0 ? [...shuffled] : [...shuffled].reverse();
    order.push(...roundOrder);
  }
  state.draftOrder = order;
  saveState();
}

// ────────────────────────────────────────────────────────
// CURRENT USER
// ────────────────────────────────────────────────────────
let currentUser = null;

// ────────────────────────────────────────────────────────
// LOGIN SCREEN INIT
// ────────────────────────────────────────────────────────
function initLogin() {
  const grid = document.getElementById('user-grid');
  USERS.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'user-btn';
    btn.textContent = u;
    btn.onclick = () => {
      document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('btn-enter').disabled = false;
      currentUser = u;
    };
    grid.appendChild(btn);
  });

  document.getElementById('btn-enter').onclick = () => {
    if (!currentUser) return;
    generateDraftOrder();
    enterMainScreen();
  };
}

function enterMainScreen() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-main').classList.add('active');
  document.getElementById('topbar-username').textContent = currentUser;
  initPlantilla();
  initDraft();
}

// ────────────────────────────────────────────────────────
// TAB SWITCHING
// ────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='plantilla') || (i===1 && tab==='draft'));
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab === 'plantilla') renderPlantilla(plantillaViewUser || currentUser);
  if (tab === 'draft') renderDraft();
}

// ────────────────────────────────────────────────────────
// PLANTILLA TAB
// ────────────────────────────────────────────────────────
let plantillaViewUser = null;

function initPlantilla() {
  plantillaViewUser = currentUser;
  const sel = document.getElementById('plantilla-user-selector');
  sel.innerHTML = '';
  USERS.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'user-pill' + (u === currentUser ? ' active' : '');
    btn.textContent = u.split(' ')[0];
    btn.onclick = () => {
      document.querySelectorAll('.user-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      plantillaViewUser = u;
      renderPlantilla(u);
    };
    sel.appendChild(btn);
  });
  renderPlantilla(currentUser);
}

function renderPlantilla(user) {
  const userPicks = state.picks
    .filter(p => p.user === user)
    .map(p => PLAYERS_RAW.find(pl => pl.id === p.playerId));

  document.getElementById('plantilla-count').textContent = `${userPicks.length} / ${MAX_PICKS} jugadores`;
  document.querySelector('.plantilla-title').textContent =
    user === currentUser ? 'Mi Plantilla' : `Plantilla de ${user.split(' ')[0]}`;

  const grid = document.getElementById('plantilla-grid');
  grid.innerHTML = '';

  const posOrder = ['PO','DF','MC','DC'];
  const sorted = [...userPicks].sort((a,b) => posOrder.indexOf(a.pos) - posOrder.indexOf(b.pos));

  sorted.forEach(p => {
    const card = document.createElement('div');
    card.className = 'player-card';
    card.innerHTML = `
      <div class="player-card-pos ${p.pos}">${p.pos}</div>
      <div class="player-card-name">${p.name}</div>
      <div class="player-card-country">${p.country}</div>
    `;
    grid.appendChild(card);
  });

  // empty slots
  for (let i = sorted.length; i < MAX_PICKS; i++) {
    const slot = document.createElement('div');
    slot.className = 'empty-slot';
    slot.textContent = `VACANTE ${i+1}`;
    grid.appendChild(slot);
  }
}

// ────────────────────────────────────────────────────────
// DRAFT TAB
// ────────────────────────────────────────────────────────
let posFilter = 'ALL';
let pendingPlayer = null;

function initDraft() {
  renderDraft();
}

function renderDraft() {
  renderDraftStatusBar();
  renderDraftOrderRow();
  renderDraftPlayerList();
  renderDraftPicks();
}

function renderDraftStatusBar() {
  const turn = state.currentTurn;
  const total = state.draftOrder.length;
  const isDone = turn >= total;
  const currentPickUser = isDone ? '—' : state.draftOrder[turn];
  const round = isDone ? MAX_PICKS : Math.floor(turn / USERS.length) + 1;
  const myPicks = state.picks.filter(p => p.user === currentUser).length;

  document.getElementById('ds-turn-num').textContent = isDone ? total : turn + 1;
  document.getElementById('ds-round').textContent = round;
  document.getElementById('ds-current-user').textContent = currentPickUser || '—';
  document.getElementById('ds-my-picks').textContent = myPicks;

  const ind = document.getElementById('draft-turn-indicator');
  if (isDone) {
    ind.textContent = 'DRAFT COMPLETO';
    ind.className = 'draft-turn-indicator done';
    document.getElementById('draft-complete-banner').classList.add('show');
  } else if (currentPickUser === currentUser) {
    ind.textContent = 'TU TURNO';
    ind.className = 'draft-turn-indicator my-turn';
  } else {
    ind.textContent = 'ESPERANDO';
    ind.className = 'draft-turn-indicator other-turn';
  }
}

function renderDraftOrderRow() {
  const row = document.getElementById('draft-order-row');
  row.innerHTML = '';
  const turn = state.currentTurn;
  const total = state.draftOrder.length;
  // show window: past 3, current, next 15
  const start = Math.max(0, turn - 3);
  const end = Math.min(total, turn + 16);
  for (let i = start; i < end; i++) {
    const chip = document.createElement('div');
    const u = state.draftOrder[i];
    chip.className = 'draft-order-chip' + (i === turn ? ' current' : '') + (i < turn ? ' done-chip' : '');
    chip.textContent = `#${i+1} ${u.split(' ')[0]}`;
    row.appendChild(chip);
  }
}

function renderDraftPicks() {
  const list = document.getElementById('draft-picks-list');
  list.innerHTML = '';
  const reversed = [...state.picks].reverse();
  if (reversed.length === 0) {
    list.innerHTML = '<div style="font-family:IBM Plex Mono,monospace;font-size:0.7rem;color:var(--muted)">Aún no hay picks</div>';
    return;
  }
  reversed.forEach(pick => {
    const player = PLAYERS_RAW.find(p => p.id === pick.playerId);
    if (!player) return;
    const row = document.createElement('div');
    row.className = 'pick-row';
    row.innerHTML = `
      <span class="pick-num">#${pick.pickNum}</span>
      <span class="pick-user">${pick.user.split(' ')[0]}</span>
      <span class="pick-pos ${player.pos}">${player.pos}</span>
      <span class="pick-player">${player.name}</span>
      <span class="pick-country">${player.country}</span>
    `;
    list.appendChild(row);
  });
}

function renderDraftPlayerList() {
  const list = document.getElementById('draft-player-list');
  list.innerHTML = '';

  const draftedIds = new Set(state.picks.map(p => p.playerId));
  const myPicks = state.picks.filter(p => p.user === currentUser);
  const myCountries = new Set(myPicks.map(p => PLAYERS_RAW.find(pl => pl.id === p.playerId)?.country));
  const searchTerm = (document.getElementById('search-input')?.value || '').toLowerCase();

  const isMyTurn = state.currentTurn < state.draftOrder.length &&
                   state.draftOrder[state.currentTurn] === currentUser;
  const myPicksFull = myPicks.length >= MAX_PICKS;

  // Group by country
  const byCountry = {};
  PLAYERS_RAW.forEach(p => {
    if (!byCountry[p.country]) byCountry[p.country] = [];
    byCountry[p.country].push(p);
  });

  const posOrderArr = ['PO','DF','MC','DC'];
  const countries = Object.keys(byCountry).sort();

  countries.forEach(country => {
    const players = byCountry[country].sort((a,b) => posOrderArr.indexOf(a.pos) - posOrderArr.indexOf(b.pos));

    // Filter
    const filtered = players.filter(p => {
      if (posFilter !== 'ALL' && p.pos !== posFilter) return false;
      if (searchTerm && !p.name.toLowerCase().includes(searchTerm) && !country.toLowerCase().includes(searchTerm)) return false;
      return true;
    });

    if (filtered.length === 0) return;

    const isCountryDrafted = myCountries.has(country);
    const allDrafted = players.every(p => draftedIds.has(p.id));

    const section = document.createElement('div');
    section.className = 'country-section';

    const header = document.createElement('div');
    header.className = 'country-header' + (isCountryDrafted ? ' has-drafted' : '');
    const availCount = players.filter(p => !draftedIds.has(p.id)).length;
    header.innerHTML = `<span>${country} <span style="color:var(--border)">(${availCount} disp.)</span></span><span class="chevron">▾</span>`;
    header.onclick = () => {
      section.classList.toggle('collapsed');
      header.classList.toggle('collapsed');
    };
    section.appendChild(header);

    const playersDiv = document.createElement('div');
    playersDiv.className = 'country-players';

    filtered.forEach(p => {
      const isDrafted = draftedIds.has(p.id);
      const isCountryBlock = !isDrafted && isCountryDrafted;
      const row = document.createElement('div');
      row.className = 'draft-player-row' + (isDrafted ? ' drafted' : '') + (isCountryBlock ? ' country-drafted' : '');
      row.innerHTML = `
        <span class="dpr-pos ${p.pos}">${p.pos}</span>
        <span class="dpr-name">${p.name}</span>
        ${isDrafted ? '<span class="dpr-badge">FICHADO</span>' : isCountryBlock ? '<span class="dpr-badge" style="color:#ff4444;border-color:#ff4444">PAÍS</span>' : ''}
      `;

      if (!isDrafted && !isCountryBlock && isMyTurn && !myPicksFull) {
        row.onclick = () => openModal(p);
      } else if (!isDrafted && !isCountryBlock && !isMyTurn) {
        row.onclick = () => showToast('No es tu turno', 'error');
      } else if (!isDrafted && isCountryBlock) {
        row.onclick = () => showToast('Ya tienes un jugador de ' + country, 'error');
      } else if (myPicksFull && !isDrafted) {
        row.onclick = () => showToast('Ya tienes 17 jugadores', 'error');
      }

      playersDiv.appendChild(row);
    });

    section.appendChild(playersDiv);
    list.appendChild(section);
  });
}

function togglePosFilter(btn, pos) {
  document.querySelectorAll('.filter-pos-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  posFilter = pos;
  renderDraftPlayerList();
}

function filterPlayers() {
  renderDraftPlayerList();
}

// ── MODAL ──
function openModal(player) {
  pendingPlayer = player;
  const myPicks = state.picks.filter(p => p.user === currentUser).length;
  document.getElementById('modal-body').innerHTML =
    `¿Fichas a <strong>${player.name}</strong> (${player.pos}) de <strong>${player.country}</strong>?<br><br>
    Picks: ${myPicks + 1} / ${MAX_PICKS}`;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  pendingPlayer = null;
}

function confirmPick() {
  if (!pendingPlayer) return;
  closeModal();

  const turn = state.currentTurn;
  if (turn >= state.draftOrder.length) return;
  if (state.draftOrder[turn] !== currentUser) return;

  const draftedIds = new Set(state.picks.map(p => p.playerId));
  const myPicks = state.picks.filter(p => p.user === currentUser);
  const myCountries = new Set(myPicks.map(p => PLAYERS_RAW.find(pl => pl.id === p.playerId)?.country));

  if (draftedIds.has(pendingPlayer.id)) { showToast('Jugador ya fichado', 'error'); return; }
  if (myCountries.has(pendingPlayer.country)) { showToast('Ya tienes un jugador de ese país', 'error'); return; }
  if (myPicks.length >= MAX_PICKS) { showToast('Ya tienes 17 jugadores', 'error'); return; }

  state.picks.push({ pickNum: turn + 1, user: currentUser, playerId: pendingPlayer.id });
  state.currentTurn = turn + 1;
  saveState();

  showToast(`✓ ${pendingPlayer.name} fichado`, 'success');
  renderDraft();
  // Also refresh plantilla if visible
  if (document.getElementById('tab-plantilla').classList.contains('active')) {
    renderPlantilla(plantillaViewUser || currentUser);
  }
}

// ── TOAST ──
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 3000);
}

// INIT
// ────────────────────────────────────────────────────────
